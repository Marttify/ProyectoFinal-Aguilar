<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login + Home</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

  <!-- LOGIN -->
  <div id="login">
    <div class="container">
      <h2>Iniciar Sesión</h2>
      <input type="text" id="usuario" placeholder="Usuario (martin)" onkeypress="if(event.key==='Enter') login()">
      <input type="password" id="password" placeholder="Contraseña (1234)" onkeypress="if(event.key==='Enter') login()">
      <button onclick="login()">Entrar</button>
    </div>
  </div>

  <!-- HOME -->
  <div id="home">

    <header class="header">
      <div class="logo">
        🌿 <span>AgroServicios</span>
      </div>

      <button id="btn-cerrar" class="btn-cerrar">Cerrar sesión</button>

      <p class="subtitle">Servicios rurales y motoimplementos</p>
    </header>

    <main class="layout">

      <!-- IZQUIERDA -->
      <div class="contenido">

        <section>
          <h2>Productos</h2>
          <div id="productosContainer" class="grid"></div>
        </section>

        <section>
          <h2>Servicios</h2>
          <div id="serviciosContainer" class="grid"></div>
        </section>

      </div>

      <!-- DERECHA -->
      <aside class="sidebar">
        <h2>Carrito</h2>

        <div id="carrito" class="carrito-lista"></div>

        <div class="carrito-footer">
          <p>Total</p>
          <span>$<span id="total">0</span></span>
        </div>

        <button id="btnFinalizar" class="btn-comprar">
          Finalizar Compra
        </button>
      </aside>

    </main>

  </div>

  <!-- JS -->
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
  <script src="js/login.js"></script>
  
</body>

</html>
